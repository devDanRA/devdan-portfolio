    <!-- CONTACTO -->
    <main class="contacto-main">
        <div class="container-fluid px-5 py-5">

            <h1 class="section-tag mb-5">// Contacto</h1>

            <div class="row g-5">

                <!-- FORMULARIO -->
                <div class="col-lg-6">
                    <p class="contacto-subtitulo">¿Tienes un proyecto en mente?</p>

                    <form id="formulario-contacto" novalidate>

                        <div class="mb-4">
                            <label for="nombre" class="form-label-custom">Nombre</label>
                            <input type="text" id="nombre" class="input-custom" placeholder="// Escribe tu nombre">
                            <span class="error-msg" id="error-nombre"></span>
                        </div>

                        <div class="mb-4">
                            <label for="apellidos" class="form-label-custom">Apellidos</label>
                            <input type="text" id="apellidos" class="input-custom"
                                placeholder="// Escribe tus apellidos">
                            <span class="error-msg" id="error-apellidos"></span>
                        </div>

                        <div class="mb-4">
                            <label for="email" class="form-label-custom">Email</label>
                            <input type="email" id="email" class="input-custom" placeholder="// tucorreo@email.com">
                            <span class="error-msg" id="error-email"></span>
                        </div>

                        <div class="mb-4">
                            <label for="telefono" class="form-label-custom">Teléfono</label>
                            <input type="tel" id="telefono" class="input-custom" placeholder="// 612345678">
                            <span class="error-msg" id="error-telefono"></span>
                        </div>

                        <div class="mb-4">
                            <label for="comentarios" class="form-label-custom">Comentarios</label>
                            <textarea id="comentarios" class="input-custom" rows="4"
                                placeholder="// Cuéntame tu proyecto..."></textarea>
                        </div>

                        <div class="d-flex gap-3">
                            <button type="submit" class="btn-primary-custom">ENVIAR</button>
                            <button type="reset" class="btn-secondary-custom">LIMPIAR</button>
                        </div>

                    </form>
                </div>

                <!-- MAPA -->
                <div class="col-lg-6">
                    <div id="mapa" class="mapa-container"></div>
                </div>

            </div>
        </div>

    <!--INIT MAPA-->
    <script>
        function initMapa() {
            const masterD = { lat: 40.4168, lng: -3.7038 };

            const mapa = new google.maps.Map(document.getElementById("mapa"), {
                zoom: 15,
                center: masterD,
                styles: [
                    { elementType: "geometry", stylers: [{ color: "#0A0A0A" }] },
                    { elementType: "labels.text.fill", stylers: [{ color: "#FF6B9D" }] },
                    { elementType: "labels.text.stroke", stylers: [{ color: "#0A0A0A" }] },
                    { featureType: "road", elementType: "geometry", stylers: [{ color: "#1A1A1A" }] },
                    { featureType: "water", elementType: "geometry", stylers: [{ color: "#000000" }] }
                ]
            });

            new google.maps.Marker({ position: masterD, map: mapa });

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const userPos = {
                            lat: position.coords.latitude,
                            lng: position.coords.longitude
                        };
                        mapa.setCenter(userPos);
                        new google.maps.Marker({ position: userPos, map: mapa });
                    },
                    () => { mapa.setCenter(masterD); }
                );
            }
        }
    </script>

    <!-- API de Google Maps -->
    <script
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAMIIrPMXVKfg7Le0NMLSNgzxKo9bmPm5c&callback=initMapa&loading=async"></script>
